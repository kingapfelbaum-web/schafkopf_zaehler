name: schafkopf_app
description: App zum Mitschreiben von Schafkopf-Spielen
publish_to: 'none'
version: 1.0.11+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  uuid: ^4.4.0
  intl: ^0.19.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  http: ^1.2.0
  shared_preferences: ^2.2.3
  share_plus: '>=7.2.2 <12.0.0'
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_launcher_icons: "^0.14.1"
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"
#  adaptive_icon_foreground_inset: 24

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
